# =====================================================================
# Agent Player - Automated Release Workflow
# =====================================================================
# Triggered when you push a version tag (e.g., v1.3.0)
#
# What it does:
# 1. Compresses application files (agent-player-files.zip)
# 2. Builds installers for Windows, Linux, macOS
# 3. Generates SHA256 checksums
# 4. Creates GitHub Release automatically
# 5. Uploads all files to the release
#
# How to use:
#   git tag v1.3.0
#   git push origin v1.3.0
#
# That's it! Everything else is automatic.
# =====================================================================

name: Release Build & Publish

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.3.0, v1.4.0, etc.

jobs:
  # ==================== Job 1: Create Release ZIP ====================
  create-release-zip:
    name: Create Application Files ZIP
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Create release ZIP
        shell: pwsh
        run: |
          Write-Host "Creating agent-player-files.zip..." -ForegroundColor Cyan

          # Exclude patterns (same as compress-for-release.ps1)
          $excludePatterns = @(
            "node_modules", ".next", ".data", ".git", "target",
            "installer", ".cache", "dist", ".turbo", ".github",
            "*.zip", ".gitignore", ".env*", "*.log"
          )

          # Get all files
          $allFiles = Get-ChildItem -Recurse -File

          # Filter excluded files
          $filesToZip = $allFiles | Where-Object {
            $file = $_
            $shouldExclude = $false
            foreach ($pattern in $excludePatterns) {
              if ($file.FullName -like "*$pattern*") {
                $shouldExclude = $true
                break
              }
            }
            -not $shouldExclude
          }

          Write-Host "Files to compress: $($filesToZip.Count)"

          # Create ZIP
          Compress-Archive -Path $filesToZip -DestinationPath agent-player-files.zip -CompressionLevel Optimal

          $zipSize = (Get-Item agent-player-files.zip).Length / 1MB
          Write-Host "ZIP created: $([math]::Round($zipSize, 2)) MB" -ForegroundColor Green

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-player-files
          path: agent-player-files.zip
          retention-days: 1

  # ==================== Job 2: Build Windows Installer ====================
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: installer
        run: cargo fetch

      - name: Build Tauri installer
        working-directory: installer
        run: cargo tauri build

      - name: Rename installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $msiPath = "installer/target/release/bundle/msi/Agent Player_${version}_x64_en-US.msi"

          if (Test-Path $msiPath) {
            Copy-Item $msiPath "agent-player-installer-${version}-win-x64.msi"
            Write-Host "✅ Windows installer ready: agent-player-installer-${version}-win-x64.msi" -ForegroundColor Green
          } else {
            Write-Host "⚠️ MSI not found at: $msiPath" -ForegroundColor Yellow
            Get-ChildItem installer/target/release/bundle/msi/ -Recurse
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: agent-player-installer-*-win-x64.msi
          retention-days: 1

  # ==================== Job 3: Build Linux AppImage ====================
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev \
            build-essential curl wget file \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        working-directory: installer
        run: cargo fetch

      - name: Build Tauri installer
        working-directory: installer
        run: cargo tauri build

      - name: Rename AppImage
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          APPIMAGE_PATH=$(find installer/target/release/bundle/appimage/ -name "*.AppImage" | head -n 1)

          if [ -f "$APPIMAGE_PATH" ]; then
            cp "$APPIMAGE_PATH" "agent-player-installer-${VERSION}-linux-x86_64.AppImage"
            chmod +x "agent-player-installer-${VERSION}-linux-x86_64.AppImage"
            echo "✅ Linux AppImage ready: agent-player-installer-${VERSION}-linux-x86_64.AppImage"
          else
            echo "⚠️ AppImage not found"
            find installer/target/release/bundle/appimage/ -type f
          fi

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: agent-player-installer-*-linux-x86_64.AppImage
          retention-days: 1

  # ==================== Job 4: Build macOS DMG ====================
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: installer
        run: cargo fetch

      - name: Build Tauri installer
        working-directory: installer
        run: cargo tauri build

      - name: Rename DMG
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          DMG_PATH=$(find installer/target/release/bundle/dmg/ -name "*.dmg" | head -n 1)

          if [ -f "$DMG_PATH" ]; then
            cp "$DMG_PATH" "agent-player-installer-${VERSION}-macos-x64.dmg"
            echo "✅ macOS DMG ready: agent-player-installer-${VERSION}-macos-x64.dmg"
          else
            echo "⚠️ DMG not found"
            find installer/target/release/bundle/dmg/ -type f
          fi

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: agent-player-installer-*-macos-x64.dmg
          retention-days: 1

  # ==================== Job 5: Create GitHub Release ====================
  create-release:
    name: Create GitHub Release
    needs: [create-release-zip, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display downloaded files
        run: |
          echo "📦 Downloaded artifacts:"
          find release-artifacts -type f -exec ls -lh {} \;

      - name: Generate checksums
        run: |
          cd release-artifacts

          # Find all files
          WIN_MSI=$(find . -name "*-win-x64.msi" -type f)
          LINUX_APPIMAGE=$(find . -name "*-linux-x86_64.AppImage" -type f)
          MACOS_DMG=$(find . -name "*-macos-x64.dmg" -type f)
          APP_ZIP=$(find . -name "agent-player-files.zip" -type f)

          # Generate checksums
          echo "# SHA256 Checksums - Agent Player ${{ github.ref_name }}" > checksums.txt
          echo "" >> checksums.txt

          if [ -f "$WIN_MSI" ]; then
            echo "## Windows Installer" >> checksums.txt
            sha256sum "$WIN_MSI" | sed 's|./[^/]*/||' >> checksums.txt
            echo "" >> checksums.txt
          fi

          if [ -f "$LINUX_APPIMAGE" ]; then
            echo "## Linux AppImage" >> checksums.txt
            sha256sum "$LINUX_APPIMAGE" | sed 's|./[^/]*/||' >> checksums.txt
            echo "" >> checksums.txt
          fi

          if [ -f "$MACOS_DMG" ]; then
            echo "## macOS DMG" >> checksums.txt
            sha256sum "$MACOS_DMG" | sed 's|./[^/]*/||' >> checksums.txt
            echo "" >> checksums.txt
          fi

          if [ -f "$APP_ZIP" ]; then
            echo "## Application Files (for stub installer)" >> checksums.txt
            sha256sum "$APP_ZIP" | sed 's|./[^/]*/||' >> checksums.txt
            echo "" >> checksums.txt
          fi

          cat checksums.txt

          # Move checksums to parent
          mv checksums.txt ../checksums.txt

      - name: Create Release Notes
        run: |
          VERSION="${{ github.ref_name }}"

          cat > release-notes.md << 'EOF'
          # 🚀 Agent Player ${{ github.ref_name }}

          Professional AI Agent Platform with voice, vision, and desktop control capabilities.

          ## 📥 Downloads

          ### Windows
          - **Installer**: `agent-player-installer-*-win-x64.msi` (~3 MB)
          - **Requirements**: Windows 10/11 (64-bit)
          - **Installation**: Double-click MSI, follow wizard

          ### Linux
          - **AppImage**: `agent-player-installer-*-linux-x86_64.AppImage` (~80 MB)
          - **Requirements**: Ubuntu 20.04+ or equivalent
          - **Installation**: `chmod +x *.AppImage && ./agent-player-installer-*.AppImage`

          ### macOS
          - **DMG**: `agent-player-installer-*-macos-x64.dmg` (~3 MB)
          - **Requirements**: macOS 11+ (Big Sur or later)
          - **Installation**: Open DMG, drag to Applications

          ## 🔐 Security

          Verify checksums using `checksums.txt`:
          ```bash
          sha256sum -c checksums.txt
          ```

          ## ⚙️ How It Works

          This is a **stub/web installer** (like Chrome, Firefox):
          1. Download small installer (~3 MB)
          2. Run installer - it downloads `agent-player-files.zip` from this release
          3. Installs to your chosen directory
          4. Creates desktop shortcuts and auto-start

          ## 📝 Changelog

          See [CHANGELOG.md](https://github.com/9mtm/Agent-Player/blob/main/CHANGELOG.md) for details.

          ## 🐛 Issues

          Report bugs at: https://github.com/9mtm/Agent-Player/issues

          ---

          **Note**: `agent-player-files.zip` is automatically downloaded by the installer during setup. You don't need to download it manually.
          EOF

      - name: Flatten artifacts directory
        run: |
          mkdir -p release-files
          find release-artifacts -type f \( -name "*.msi" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.zip" \) -exec cp {} release-files/ \;
          cp checksums.txt release-files/
          ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Agent Player ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            release-files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Success message
        run: |
          echo "================================================"
          echo "✅ Release published successfully!"
          echo "================================================"
          echo ""
          echo "🔗 Release URL:"
          echo "   https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          echo ""
          echo "📦 Installer will download from:"
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "   https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/agent-player-files.zip"
          echo ""
