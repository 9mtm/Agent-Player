version: '3.8'

services:
  # Frontend Service (Next.js)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: agent-player-frontend:latest
    container_name: agent-player-frontend
    ports:
      - "41521:41521"
    environment:
      - NODE_ENV=production
      - PORT=41521
      - NEXT_PUBLIC_API_URL=http://backend:41522
    volumes:
      - public-storage:/app/public/storage:rw
    networks:
      - agent-player-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:41521', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend Service (Fastify + Python)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: agent-player-backend:latest
    container_name: agent-player-backend
    ports:
      - "41522:41522"
    environment:
      - NODE_ENV=production
      - PORT=41522
      - DATABASE_PATH=/app/.data/agent-player.db
      - STORAGE_BASE_DIR=/app/public/storage
      - MEMORY_BASE_DIR=/app/.data/memory
      - PYTHON_PATH=/usr/local/bin/python3
    volumes:
      - data-storage:/app/.data:rw
      - public-storage:/app/public/storage:rw
    networks:
      - agent-player-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:41522/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Named volumes for data persistence
volumes:
  data-storage:
    driver: local
    name: agent-player-data
  public-storage:
    driver: local
    name: agent-player-public

# Bridge network for inter-container communication
networks:
  agent-player-network:
    driver: bridge
    name: agent-player-network
